<style>
:root {
    --bg-primary: #0A0E1A;
    --bg-secondary: #0F1524;
    --bg-card: #141B2D;
    --bg-card-elevated: #1A2238;
    --bg-input: #0C111E;
    --border-subtle: rgba(255,255,255,0.06);
    --border-medium: rgba(255,255,255,0.12);
    --border-strong: rgba(255,255,255,0.2);

    --text-primary: #F4F6FB;
    --text-secondary: #A4ADC2;
    --text-tertiary: #6B7388;
    --text-muted: #4A5066;

    --accent-emerald: #10B981;
    --accent-amber: #F59E0B;
    --accent-rose: #EF4444;
    --accent-blue: #3B82F6;
    --accent-violet: #8B5CF6;
    --accent-cyan: #06B6D4;

    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; background: var(--bg-primary); }

body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    direction: rtl;
    -webkit-font-smoothing: antialiased;
}

#initShield {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
    transition: opacity 0.4s;
}
#initShield.hidden { opacity: 0; pointer-events: none; }
#initShield .ring {
    width: 42px; height: 42px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent-emerald);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
#initShield .label {
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 600;
}

.cmd-header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-medium);
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
}
.cmd-header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1900px;
    margin: 0 auto;
    gap: 24px;
}
.cmd-titles .super {
    font-family: 'Cairo', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-emerald);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
}
.cmd-titles h1 {
    font-family: 'Cairo', sans-serif;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
}
.cmd-titles .subtitle {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-top: 4px;
}
.cmd-status { display: flex; gap: 10px; align-items: center; }
.cmd-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
}

.cmd-main {
    max-width: 1900px;
    margin: 0 auto;
    padding: 28px 32px 80px;
}

.upload-section { margin-bottom: 28px; }
.section-title {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
}
.section-title h2 {
    font-family: 'Cairo', sans-serif;
    font-size: 17px; font-weight: 700;
}
.section-title .badge {
    padding: 3px 10px;
    background: var(--bg-card-elevated);
    color: var(--text-secondary);
    font-size: 11px; font-weight: 700;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-subtle);
}

.upload-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
}
.upload-card {
    background: var(--bg-card);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-md);
    padding: 16px;
    transition: border-color 0.2s, background 0.2s;
}
.upload-card.has-file {
    border-style: solid;
    border-color: var(--accent-emerald);
    background: linear-gradient(180deg, var(--bg-card) 0%, rgba(16,185,129,0.03) 100%);
}
.upload-card-header { margin-bottom: 12px; }
.hospital-info h3 {
    font-family: 'Cairo', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 3px;
}
.hospital-info .lab-name {
    font-size: 10px;
    color: var(--text-tertiary);
    font-weight: 500;
    direction: ltr;
    text-align: right;
}
.upload-input-wrap { position: relative; }
.upload-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-label {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 9px;
    background: var(--bg-input);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
}
.upload-card:hover .upload-label {
    background: var(--bg-card-elevated);
    color: var(--text-primary);
}
.upload-status {
    margin-top: 8px;
    padding: 7px 9px;
    background: var(--bg-input);
    border-radius: var(--radius-sm);
    font-size: 10.5px;
    color: var(--text-tertiary);
    font-family: 'JetBrains Mono', monospace;
    min-height: 28px;
    display: flex; align-items: center;
    direction: ltr; text-align: right;
}
.upload-status.success { color: var(--accent-emerald); }
.upload-status.error { color: var(--accent-rose); }

.actions-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
}
.actions-info { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
.info-stat { display: flex; flex-direction: column; gap: 2px; }
.info-stat .label {
    font-size: 11px; color: var(--text-tertiary);
    font-weight: 500;
}
.info-stat .value {
    font-size: 14px; font-weight: 700;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
}
.actions-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; padding: 9px 16px;
    border-radius: var(--radius-sm);
    font-family: 'Tajawal', sans-serif;
    font-size: 12.5px; font-weight: 700;
    cursor: pointer; border: 1px solid var(--border-medium);
    transition: all 0.2s;
    background: var(--bg-card-elevated);
    color: var(--text-primary);
}
.btn:hover:not(:disabled) {
    background: var(--bg-input);
    border-color: var(--border-strong);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
    background: var(--accent-blue);
    border-color: var(--accent-blue); color: #fff;
}
.btn-primary:hover:not(:disabled) { background: #2563EB; }

.btn-share {
    background: linear-gradient(135deg, #10B981, #06B6D4) !important;
    border-color: transparent !important;
    color: #fff !important;
    font-weight: 800 !important;
}
.btn-share:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(16,185,129,0.3);
}

.empty-state {
    padding: 70px 30px;
    text-align: center;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
}
.empty-state h3 {
    font-family: 'Cairo', sans-serif;
    font-size: 18px;
    color: var(--text-secondary);
    margin-bottom: 8px;
}
.empty-state p { color: var(--text-tertiary); font-size: 13px; }

.results-section { display: none; }
.results-section.active { display: block; }

.indicator-explainer {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 24px 26px;
    margin-bottom: 22px;
}
.indicator-explainer h2 {
    font-family: 'Cairo', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.indicator-explainer h2::before {
    content: '';
    width: 4px;
    height: 22px;
    background: var(--accent-emerald);
    border-radius: 2px;
}
.indicator-text {
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.85;
    margin-bottom: 18px;
}
.indicator-stages-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 16px;
}
.indicator-stage-box {
    background: var(--bg-input);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 14px;
    border-right: 3px solid var(--accent-cyan);
}
.indicator-stage-box .num {
    display: inline-block;
    background: var(--bg-card-elevated);
    color: var(--text-secondary);
    width: 22
